<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo HD Karo - Free Upscaler</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; text-align: center; }
    .container { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        input[type="file"] { margin: 20px 0; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #status { margin: 20px 0; font-weight: bold; color: #dc2626; }
    .images { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
    .img-box { flex: 1; min-width: 250px; }
    .img-box img { max-width: 100%; border-radius: 8px; border: 2px solid #e5e7eb; }
    .img-box p { font-weight: bold; margin: 10px 0 5px 0; }
        #downloadBtn { background: #16a34a; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Blurry Photo Ko HD Banao</h1>
        <p>Photo upload karo, 2x HD download karo. Bilkul Free!</p>

        <input type="file" id="imageInput" accept="image/*">
        <br>
        <button id="upscaleBtn" onclick="upscaleImage()">2x HD Banao</button>

        <div id="status"></div>

        <div class="images" id="result" style="display:none;">
            <div class="img-box">
                <p>Original Photo</p>
                <img id="originalImg">
            </div>
            <div class="img-box">
                <p>HD Photo</p>
                <img id="upscaledImg">
            </div>
        </div>

        <a id="downloadLink" download="hd-photo.png">
            <button id="downloadBtn">HD Photo Download Karo</button>
        </a>
    </div>

<script>
// 👇👇👇 YAHAN TERI API KEY DAALNI HAI 👇👇👇
const DEEPAI_API_KEY = "040151d3-0820-4821-b2be-db364ac72651";
// 👆👆👆 BAS YE LINE CHANGE KARNI THI 👆👆👆

async function upscaleImage() {
    const fileInput = document.getElementById('imageInput');
    const status = document.getElementById('status');
    const btn = document.getElementById('upscaleBtn');

    if (!fileInput.files[0]) {
        alert('Pehle photo select karo bhai');
        return;
    }

    btn.disabled = true;
    status.innerHTML = 'Photo upload ho rahi hai... 20-40 sec lagega';

    const file = fileInput.files[0];
    document.getElementById('originalImg').src = URL.createObjectURL(file);

    const formData = new FormData();
    formData.append('image', file);

    try {
        const response = await fetch("https://api.deepai.org/api/torch-srgan", {
            method: "POST",
            headers: {
                "api-key": DEEPAI_API_KEY
            },
            body: formData
        });

        const result = await response.json();

        if (result.output_url) {
            document.getElementById('upscaledImg').src = result.output_url;
            document.getElementById('downloadLink').href = result.output_url;
            document.getElementById('result').style.display = 'flex';
            document.getElementById('downloadBtn').style.display = 'inline-block';
            status.innerHTML = 'Ho gaya! HD photo ready hai';
        } else {
            throw new Error(result.err || 'API fail');
        }

    } catch (error) {
        status.innerHTML = 'Error: Photo HD nahi ho payi. Key check kar ya 1 min baad try kar';
        console.error(error);
    }

    btn.disabled = false;
}
</script>
</body>
</html>
