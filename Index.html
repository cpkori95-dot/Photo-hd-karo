<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo HD Karo - Free Upscaler</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; text-align: center; }
     .container { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        input[type="file"] { margin: 20px 0; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #status { margin: 20px 0; font-weight: bold; color: #dc2626; }
     .images { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
     .img-box { flex: 1; min-width: 250px; }
     .img-box img { max-width: 100%; border-radius: 8px; border: 2px solid #e5e7eb; }
     .img-box p { font-weight: bold; margin: 10px 0 5px 0; }
        #downloadBtn { background: #16a34a; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Blurry Photo Ko HD Banao</h1>
        <p>Photo upload karo, 2x HD download karo. Bilkul Free!</p>

        <input type="file" id="imageInput" accept="image/*">
        <br>
        <button id="upscaleBtn" onclick="upscaleImage()">2x HD Banao</button>

        <div id="status"></div>

        <div class="images" id="result" style="display:none;">
            <div class="img-box">
                <p>Original Photo</p>
                <img id="originalImg">
            </div>
            <div class="img-box">
                <p>HD Photo</p>
                <img id="upscaledImg">
            </div>
        </div>

        <a id="downloadLink" download="hd-photo.png">
            <button id="downloadBtn">HD Photo Download Karo</button>
        </a>
    </div>

<script>
const REPLICATE_API_TOKEN = "r8_QyG8QtDWrNwQ9F9ArWb0bKJobkmfHZK0hIvQy";

async function upscaleImage() {
    const fileInput = document.getElementById('imageInput');
    const status = document.getElementById('status');
    const btn = document.getElementById('upscaleBtn');

    if (!fileInput.files[0]) {
        alert('Pehle photo select karo bhai');
        return;
    }

    btn.disabled = true;
    status.innerHTML = 'Photo upload ho rahi hai... 30-60 sec lagega, ruk ja';

    const base64Image = await toBase64(fileInput.files[0]);
    document.getElementById('originalImg').src = base64Image;

    try {
        const response = await fetch("https://api.replicate.com/v1/predictions", {
            method: "POST",
            headers: {
                "Authorization": `Token ${REPLICATE_API_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                version: "42fed1c4974146d4d2414e2be2c5277c7fcf05fcc3a73abf41610695738c1d7b",
                input: {
                    image: base64Image,
                    scale: 2
                }
            })
        });

        let prediction = await response.json();

        while (prediction.status!== "succeeded" && prediction.status!== "failed") {
            await new Promise(resolve => setTimeout(resolve, 2000));
            const poll = await fetch(`https://api.replicate.com/v1/predictions/${prediction.id}`, {
                headers: { "Authorization": `Token ${REPLICATE_API_TOKEN}` }
            });
            prediction = await poll.json();
            status.innerHTML = `Ban rahi hai HD... Status: ${prediction.status}`;
        }

        if (prediction.status === "succeeded") {
            const hdImageUrl = prediction.output;
            document.getElementById('upscaledImg').src = hdImageUrl;
            document.getElementById('downloadLink').href = hdImageUrl;
            document.getElementById('result').style.display = 'flex';
            document.getElementById('downloadBtn').style.display = 'inline-block';
            status.innerHTML = 'Ho gaya! Neeche se HD photo download kar le';
        } else {
            throw new Error('API fail ho gayi');
        }

    } catch (error) {
        status.innerHTML = 'Error: Photo HD nahi ho payi. 1 min baad try kar ya dusri photo daal';
        console.error(error);
    }

    btn.disabled = false;
}

function toBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}
</script>
</body>
          </html>
